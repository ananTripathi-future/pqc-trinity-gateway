# strongSwan IKEv2 Configuration for PQC Trinity Gateway
# ML-KEM-768 hybrid key exchange (FIPS 203)

connections {
  pqc-tunnel {
    version = 2
    proposals = aes256gcm128-sha3_256-x25519-ke1_mlkem768
    fragmentation = yes
    dpd_delay = 30s

    local {
      auth = pubkey
      certs = /etc/pqc-gateway/keys/tls_cert.pem
    }
    remote {
      auth = pubkey
    }
    children {
      pqc-child {
        esp_proposals = aes256gcm128-sha3_256
        mode = tunnel
        start_action = trap
      }
    }
  }
}

charon {
  fragment_size = 1400
  retransmit_timeout = 4.0
  retransmit_tries = 5
}
