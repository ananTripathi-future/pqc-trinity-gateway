# PQC Trinity Gateway — Runtime Configuration
# /etc/pqc-gateway/gateway.conf

# ── Networking ────────────────────────────────────────────────────────────────
tls_port = 8443
ssh_port = 2222

# ── TLS Certificate (Layer 2) ────────────────────────────────────────────────
tls_cert = /etc/pqc-gateway/keys/tls_cert.pem
tls_key = /etc/pqc-gateway/keys/tls_key.pem

# ── Audit Log ─────────────────────────────────────────────────────────────────
audit_log = /var/log/pqc-gateway/audit.log

# ── Privilege Separation ──────────────────────────────────────────────────────
runtime_user = pqcgateway

# ── Verbose Logging (stderr) ─────────────────────────────────────────────────
verbose = true
