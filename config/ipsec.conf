# IPsec connection definitions for PQC Trinity Gateway

config setup
    charondebug="ike 2, knl 2, cfg 2"

conn pqc-tunnel
    keyexchange=ikev2
    ike=aes256gcm128-sha3_256-x25519-ke1_mlkem768!
    esp=aes256gcm128-sha3_256!
    left=%defaultroute
    leftcert=/etc/pqc-gateway/keys/tls_cert.pem
    right=%any
    rightauth=pubkey
    auto=add
    fragmentation=yes
